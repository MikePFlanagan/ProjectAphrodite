services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aphrodite
      POSTGRES_USER: aphrodite
      POSTGRES_PASSWORD: aphrodite
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aphrodite -d aphrodite"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes: { postgres_data: {} }
